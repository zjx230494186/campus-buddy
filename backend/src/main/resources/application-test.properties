# Profile: test
# Purpose: automated tests, no real database, no real mail, in-memory state

# Campus email configuration - test uses same default domain
campus-buddy.campus-email.allowed-domains[0]=campus.edu.cn
campus-buddy.campus-email.code-expires-in-seconds=600
campus-buddy.campus-email.resend-after-seconds=60

# Object storage non-sensitive configuration
campus-buddy.object-storage.provider=huaweicloud-obs
campus-buddy.object-storage.endpoint=obs.cn-north-4.myhuaweicloud.com
campus-buddy.object-storage.region=cn-north-4
campus-buddy.object-storage.bucket=20260518-bighomework
campus-buddy.object-storage.access-mode=backend-proxy
campus-buddy.object-storage.public-read=false
campus-buddy.object-storage.cors-enabled=false

# JWT placeholder
campus-buddy.security.jwt-placeholder.test-token=technical-spike-test-token
campus-buddy.security.jwt-placeholder.principal=technical-spike-user

# Logging
logging.level.com.campusbuddy=DEBUG
