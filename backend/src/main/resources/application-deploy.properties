# Profile: deploy
# Purpose: production or demo deployment on ECS

# Campus email configuration
# TODO: replace with real campus domain before production
campus-buddy.campus-email.allowed-domains[0]=campus.edu.cn
campus-buddy.campus-email.code-expires-in-seconds=600
campus-buddy.campus-email.resend-after-seconds=60

# Object storage non-sensitive configuration
campus-buddy.object-storage.provider=huaweicloud-obs
campus-buddy.object-storage.endpoint=obs.cn-north-4.myhuaweicloud.com
campus-buddy.object-storage.region=cn-north-4
campus-buddy.object-storage.bucket=20260518-bighomework
campus-buddy.object-storage.access-mode=backend-proxy
campus-buddy.object-storage.public-read=false
campus-buddy.object-storage.cors-enabled=false

# JWT - signing secret must be provided via environment variable in production
campus-buddy.security.jwt.secret=${JWT_SECRET}
campus-buddy.security.jwt.access-token-expires-in-seconds=900
campus-buddy.security.jwt.refresh-token-expires-in-seconds=2592000

# JWT placeholder (retained for backward compat, not used in real auth flow)
campus-buddy.security.jwt-placeholder.test-token=technical-spike-test-token
campus-buddy.security.jwt-placeholder.principal=technical-spike-user

# Database - sensitive values must be provided via environment variables
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:campus_buddy}
spring.datasource.username=${DB_USERNAME:campus_buddy}
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true

# Logging
logging.level.com.campusbuddy=INFO
