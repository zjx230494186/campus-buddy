# Profile: local-h2
# Purpose: local development with H2 in-memory database

spring.datasource.url=jdbc:h2:mem:campusbuddy;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.flyway.enabled=false

campus-buddy.campus-email.allowed-domains[0]=${CAMPUS_EMAIL_ALLOWED_DOMAIN:campus.edu.cn}
campus-buddy.campus-email.code-expires-in-seconds=600
campus-buddy.campus-email.resend-after-seconds=60
campus-buddy.campus-email.delivery-mode=${CAMPUS_EMAIL_DELIVERY_MODE:noop}
campus-buddy.campus-email.smtp.host=${CAMPUS_EMAIL_SMTP_HOST:}
campus-buddy.campus-email.smtp.port=${CAMPUS_EMAIL_SMTP_PORT:587}
campus-buddy.campus-email.smtp.username=${CAMPUS_EMAIL_SMTP_USERNAME:}
campus-buddy.campus-email.smtp.password=${CAMPUS_EMAIL_SMTP_PASSWORD:}
campus-buddy.campus-email.smtp.from=${CAMPUS_EMAIL_SMTP_FROM:}
campus-buddy.campus-email.smtp.from-name=${CAMPUS_EMAIL_SMTP_FROM_NAME:校园搭子平台}
campus-buddy.campus-email.smtp.auth=${CAMPUS_EMAIL_SMTP_AUTH:true}
campus-buddy.campus-email.smtp.start-tls=${CAMPUS_EMAIL_SMTP_START_TLS:true}
campus-buddy.campus-email.smtp.ssl=${CAMPUS_EMAIL_SMTP_SSL:false}

campus-buddy.object-storage.provider=huaweicloud-obs
campus-buddy.object-storage.endpoint=obs.cn-north-4.myhuaweicloud.com
campus-buddy.object-storage.region=cn-north-4
campus-buddy.object-storage.bucket=20260518-bighomework
campus-buddy.object-storage.access-mode=backend-proxy
campus-buddy.object-storage.public-read=false
campus-buddy.object-storage.cors-enabled=false

campus-buddy.post-moderation.enabled=${POST_MODERATION_ENABLED:false}
campus-buddy.post-moderation.provider=${POST_MODERATION_PROVIDER:noop}
campus-buddy.post-moderation.api-key=${POST_MODERATION_API_KEY:}
campus-buddy.post-moderation.model=${POST_MODERATION_MODEL:gpt-4o-mini}
campus-buddy.post-moderation.base-url=${POST_MODERATION_BASE_URL:https://api.openai.com/v1/chat/completions}
campus-buddy.post-moderation.timeout-millis=${POST_MODERATION_TIMEOUT_MILLIS:8000}
campus-buddy.post-moderation.auto-approve-threshold=${POST_MODERATION_AUTO_APPROVE_THRESHOLD:0.92}
campus-buddy.post-moderation.auto-reject-threshold=${POST_MODERATION_AUTO_REJECT_THRESHOLD:0.85}
campus-buddy.post-moderation.max-input-chars=${POST_MODERATION_MAX_INPUT_CHARS:2000}

campus-buddy.security.jwt.secret=local-dev-secret-key-must-be-at-least-32-characters-long-for-hmac-sha256
campus-buddy.security.jwt.access-token-expires-in-seconds=900
campus-buddy.security.jwt.refresh-token-expires-in-seconds=2592000

campus-buddy.security.jwt-placeholder.test-token=technical-spike-test-token
campus-buddy.security.jwt-placeholder.principal=technical-spike-user

logging.level.com.campusbuddy=DEBUG

spring.h2.console.enabled=true
